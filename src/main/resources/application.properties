# ─────────────────────────────────────────────
# Configuración de la aplicación
# ─────────────────────────────────────────────
spring.application.name=biblioteca-api

# ─────────────────────────────────────────────
# Conexión a MongoDB Atlas
# IMPORTANTE: Reemplaza esta URI con tu cadena de conexión real de MongoDB Atlas
# Formato: mongodb+srv://<usuario>:<password>@<cluster>.mongodb.net/<basedatos>?retryWrites=true&w=majority
# ─────────────────────────────────────────────
spring.data.mongodb.uri=mongodb+srv://adminBiblioteca:TuPassword@biblioteca-cluster.mongodb.net/biblioteca_db?retryWrites=true&w=majority

# Nombre de la base de datos en MongoDB
spring.data.mongodb.database=biblioteca_db

# ─────────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.biblioteca=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
