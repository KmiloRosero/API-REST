# ─────────────────────────────────────────────
# Configuración de la aplicación
# ─────────────────────────────────────────────
spring.application.name=biblioteca-api

# ─────────────────────────────────────────────
# Conexión a MongoDB Atlas
# IMPORTANTE: Reemplaza <DB_USER> y <DB_PASSWORD> con tus credenciales reales
# Formato: mongodb+srv://<usuario>:<password>@<cluster>.mongodb.net/<basedatos>?retryWrites=true&w=majority
# ─────────────────────────────────────────────
spring.data.mongodb.uri=mongodb+srv://<DB_USER>:<DB_PASSWORD>@cluster0.22fkw2t.mongodb.net/biblioteca_db?retryWrites=true&w=majority&tls=true&tlsAllowInvalidCertificates=true

# Nombre de la base de datos en MongoDB
spring.data.mongodb.database=biblioteca_db

# ─────────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.org.springframework.data.mongodb=DEBUG
